name: CI/CD PIPELINE

on:
  workflow_dispatch:
    inputs:
      target_job:
        description: 'Sélectionnez le job à tester'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - setup
          - install
          - lint
          - test
          - build
          - build-artifact
          - docker-build
          - docker-push
          - integration-test

defaults:
  run:
    working-directory: ./chatbot


env:
  PROJECT_NAME: "Chatbot-LLM"
  PROJECT_CATEGORY: "IA"

  
jobs:
# 1. SETUP - Préparation de l'environnement
  setup:
    if: github.event.inputs.target_job == 'setup' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: python3 --version

# 2. INSTALL - Dépendances
  install:
    needs: [setup]
    if: always() && (github.event.inputs.target_job == 'install' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt ruff pytest --break-system-packages

# 3. LINT - Vérification de syntaxe 
  lint:
    needs: [install]
    if: always() && (github.event.inputs.target_job == 'lint' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: /home/medyassine/.local/bin/ruff check .

# 4. TEST - Vérification 
  test:
    needs: [lint]
    if: always() && (github.event.inputs.target_job == 'test' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ || true

# 5. BUILD - Compilation
  build:
    needs: [test]
    if: always() && (github.event.inputs.target_job == 'build' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m compileall app/

# 6. BUILD-ARTIFACT - Packaging
  build-artifact:
    needs: [build]
    if: always() && (github.event.inputs.target_job == 'build-artifact' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Create Deployment Package
        run: |
          mkdir -p dist
          tar -czvf dist/chatbot-artifact.tar.gz .
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: chatbot-package
          path: chatbot/dist/chatbot-artifact.tar.gz
          retention-days: 1

# 7. DOCKER-BUILD - Création de l'image
  docker-build:
    needs: [build-artifact]
    if: always() && (github.event.inputs.target_job == 'docker-build' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-bot:latest .

# 8. DOCKER-PUSH - Envoi
  docker-push:
    needs: [docker-build]
    if: always() && (github.event.inputs.target_job == 'docker-push' || github.event.inputs.target_job == 'all')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-bot:latest


  integration-test:
    if: github.event.inputs.target_job == 'integration-test' || github.event.inputs.target_job == 'all'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Integration Test
        env:
          # Mise à jour avec le nom d'image utilisé dans ton CI : devops-bot
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-bot:latest
          CONTAINER_NAME: devops-bot-test-${{ github.run_id }}
        run: |
          set -Eeuo pipefail
          
          # 1. Port aléatoire pour éviter les collisions sur ton Latitude-5490
          PORT=$(shuf -i 20000-65000 -n 1)
          echo "Démarrage du conteneur $CONTAINER_NAME sur le port $PORT"
          
          # 2. Nettoyage préventif
          docker rm -f $CONTAINER_NAME >/dev/null 2>&1 || true
          
          # 3. Lancement du conteneur
          docker run -d \
            --name $CONTAINER_NAME \
            -p $PORT:8000 \
            $IMAGE
          
          # 4. Temps d'attente pour stabilisation
          sleep 10
          
          # 5. Vérification de l'état
          if [ "$(docker inspect -f '{{.State.Running}}' $CONTAINER_NAME)" == "true" ]; then
             echo "Le Chatbot est opérationnel sur le port $PORT"
             
             # curl http://localhost:$PORT/health || exit 1
          else
             echo "Échec du démarrage du conteneur"
             docker logs $CONTAINER_NAME
             exit 1
          fi

      - name: Cleanup Test Container
        if: always()
        run: |
          CONTAINER_NAME="devops-bot-test-${{ github.run_id }}"
          echo "🧹 Nettoyage du conteneur $CONTAINER_NAME"
          docker rm -f $CONTAINER_NAME >/dev/null 2>&1 || true

